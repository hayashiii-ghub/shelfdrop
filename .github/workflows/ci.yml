name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and validate scripts
        run: make check

      - name: Build installable app
        if: github.event_name == 'pull_request'
        env:
          SHELFDROP_UNIVERSAL: "1"
          SHELFDROP_VERSION: "0.2.5"
        run: ./script/package.sh

      - name: Upload installable app
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ShelfDrop-macos-pr
          path: dist/ShelfDrop-macos.zip
