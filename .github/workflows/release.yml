name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build distributable zip
        run: ./script/package.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShelfDrop-macos
          path: dist/ShelfDrop-macos.zip

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "ShelfDrop macOS build."
          gh release upload "$TAG_NAME" dist/ShelfDrop-macos.zip --clobber
