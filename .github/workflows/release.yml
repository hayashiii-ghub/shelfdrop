name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select full Xcode if available
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          fi
          xcode-select -p

      - name: Build distributable zip
        env:
          SHELFDROP_UNIVERSAL: "1"
          SHELFDROP_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0' }}
        run: ./script/package.sh

      - name: Verify bundle version
        env:
          EXPECTED_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0' }}
        run: |
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"
          ACTUAL_VERSION="$(plutil -extract CFBundleShortVersionString raw dist/package/ShelfDrop.app/Contents/Info.plist)"
          test "$ACTUAL_VERSION" = "$EXPECTED_VERSION"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShelfDrop-macos
          path: dist/ShelfDrop-macos.zip

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "ShelfDrop macOS build."
          gh release upload "$TAG_NAME" dist/ShelfDrop-macos.zip --clobber
