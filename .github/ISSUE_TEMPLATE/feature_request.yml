name: 機能提案
description: 新しい機能や操作改善を提案する
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: 現在どのような作業で困っているかを記載してください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する動作
      description: ShelfDropがどのように動くと解決できるかを記載してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: モックアップや参考画像があれば添付してください。
  - type: checkboxes
    id: checks
    attributes:
      label: 確認事項
      options:
        - label: 既存Issueに同じ提案がないことを確認しました
          required: true
